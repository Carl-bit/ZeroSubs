services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: zerosubs
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d zerosubs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerosubs

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerosubs

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - zerosubs

  backend:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - zerosubs

  subtitle-worker:
    build: ../backend
    restart: unless-stopped
    command: ["node", "dist/workers/subtitle.worker.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zerosubs

  subtitle-scheduler:
    build: ../backend
    restart: unless-stopped
    command: ["node", "dist/workers/scheduler.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zerosubs

  subgen:
    image: ghcr.io/mccloudS/subgen:latest
    restart: unless-stopped
    environment:
      WHISPER_MODEL: large-v3
      CONCURRENT_TRANSCRIPTIONS: "1"
    volumes:
      - ${MEDIA_PATH:-./media}:/media
      - subgen_cache:/subgen/cache
    expose:
      - "9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - zerosubs

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  subgen_cache:

networks:
  zerosubs:
    driver: bridge
